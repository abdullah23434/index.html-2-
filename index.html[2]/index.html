<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ريالك | الإدارة المالية الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e; /* كحلي ملكي */
            --accent: #c5a059;  /* ذهبي مطفي */
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid var(--accent);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .tagline {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .budget-grid {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        .budget-item {
            background: #fafafa;
            padding: 15px;
            border-radius: 12px;
            border-right: 5px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info span {
            display: block;
            font-size: 0.8rem;
            color: #888;
        }

        .amount {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .custom-ratio {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }

        .ratio-input {
            width: 50px;
            padding: 5px;
            text-align: center;
        }

        .days-counter {
            background: var(--primary);
            color: var(--white);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
        }

        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ريالك</h1>
        <div class="tagline">إدارة مالية برؤية احترافية</div>
    </header>

    <div id="countdown" class="days-counter">
        جاري حساب موعد الراتب...
    </div>

    <div class="input-group">
        <label>أدخل الدخل الشهري (ريال)</label>
        <input type="number" id="salary" placeholder="مثلاً: 12000" oninput="calculate()">
    </div>

    <div class="budget-grid">
        <div class="budget-item">
            <div class="item-info">
                <strong>الضروريات</strong>
                <div class="custom-ratio">
                    <span>النسبة:</span>
                    <input type="number" class="ratio-input" id="r1" value="50" oninput="calculate()">%
                </div>
            </div>
            <div class="amount" id="val1">0</div>
        </div>

        <div class="budget-item" style="border-right-color: #28a745;">
            <div class="item-info">
                <strong>الادخار والاستثمار</strong>
                <div class="custom-ratio">
                    <span>النسبة:</span>
                    <input type="number" class="ratio-input" id="r2" value="20" oninput="calculate()">%
                </div>
            </div>
            <div class="amount" id="val2" style="color: #28a745;">0</div>
        </div>

        <div class="budget-item" style="border-right-color: #dc3545;">
            <div class="item-info">
                <strong>التزامات أو ديون</strong>
                <div class="custom-ratio">
                    <span>النسبة:</span>
                    <input type="number" class="ratio-input" id="r3" value="20" oninput="calculate()">%
                </div>
            </div>
            <div class="amount" id="val3" style="color: #dc3545;">0</div>
        </div>

        <div class="budget-item" style="border-right-color: #fd7e14;">
            <div class="item-info">
                <strong>مصاريف ترفيهية</strong>
                <div class="custom-ratio">
                    <span>النسبة:</span>
                    <input type="number" class="ratio-input" id="r4" value="10" oninput="calculate()">%
                </div>
            </div>
            <div class="amount" id="val4" style="color: #fd7e14;">0</div>
        </div>
    </div>

    <p class="footer-note">جميع البيانات تُحفظ محلياً على جهازك فقط</p>
</div>

<script>
    function calculate() {
        const salary = document.getElementById('salary').value || 0;
        
        // جلب النسب من المستخدم
        const ratios = [
            document.getElementById('r1').value,
            document.getElementById('r2').value,
            document.getElementById('r3').value,
            document.getElementById('r4').value
        ];

        // الحساب والعرض
        ratios.forEach((ratio, index) => {
            const result = (salary * (ratio / 100)).toLocaleString();
            document.getElementById(`val${index + 1}`).innerText = result + ' ر.س';
        });

        // حفظ البيانات
        localStorage.setItem('mySalary', salary);
        ratios.forEach((r, i) => localStorage.setItem(`ratio${i}`, r));
    }

    function updateCountdown() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        let salaryDate = new Date(year, month, 27);

        if (now > salaryDate) {
            salaryDate = new Date(year, month + 1, 27);
        }

        const diff = Math.ceil((salaryDate - now) / (1000 * 60 * 60 * 24));
        document.getElementById('countdown').innerText = `باقي ${diff} أيام على الراتب (27 ميلادي)`;
    }

    // استرجاع البيانات عند الفتح
    window.onload = () => {
        if(localStorage.getItem('mySalary')) {
            document.getElementById('salary').value = localStorage.getItem('mySalary');
            for(let i=0; i<4; i++) {
                if(localStorage.getItem(`ratio${i}`)) {
                    document.getElementById(`r${i+1}`).value = localStorage.getItem(`ratio${i}`);
                }
            }
            calculate();
        }
        updateCountdown();
    };
</script>

</body>
</html>
